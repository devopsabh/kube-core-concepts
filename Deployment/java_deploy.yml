apiVersion: apps/v1
kind: Deployment
metadata: 
  name: java-deploy
  labels: 
    app: java-manager
spec: 
  replicas: 3
  selector:
    matchLabels: 
      app: java-pod
  template:
    metadata:
      labels:
        app: java-pod
    spec:
      containers:
        - name: java-cont
          image: amazoncorretto:21   
